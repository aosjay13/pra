<!DOCTYPE html>
<html>
<head>
<style>
  /* Dark theme for the page */
  body {
    background-color: #121212;
    color: #ffffff;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin-bottom: 20px;
  }

  .calendar-container {
    width: 100%;
    height: 70vh;
    min-height: 600px;
    border: 1px solid #333;
    border-radius: 8px;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 800px;
    border: none;
  }
</style>
</head>
<body>

  <h1>Prodigy Racing Association Calendar</h1>

  <div class="calendar-container">
    <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FNew_York&showPrint=0&src=cHJhLndyZWNrZmVzdC5wY0BnbWFpbC5jb20&color=%23000000&theme=DARK" style="border:solid 1px #777" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
  </div>

</body>
</html>
